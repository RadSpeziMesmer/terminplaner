<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<title>Terminplaner</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f8fafc;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 16px;
    padding: 24px;
    text-align: center;
  }
  .icon { font-size: 48px; }
  h1 { font-size: 18px; font-weight: 600; color: #0f172a; }
  p  { font-size: 13px; color: #64748b; line-height: 1.5; }
  .btn-open {
    margin-top: 8px;
    padding: 12px 28px;
    background: #1a56db;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.1s;
  }
  .btn-open:hover { background: #1741b6; }
  .status { font-size: 12px; color: #64748b; min-height: 18px; }
</style>
</head>
<body>
  <div class="icon">📅</div>
  <h1>Terminplaner</h1>
  <p>Öffne den Wochenkalender um Termine schnell zu erfassen.</p>
  <button class="btn-open" onclick="openCalendar()">Kalender öffnen</button>
  <div class="status" id="status"></div>

<script>
  // ─────────────────────────────────────────────────────
  // KONFIGURATION – hier deine SharePoint-URL eintragen!
  // ─────────────────────────────────────────────────────
  const DIALOG_URL = 'https://radspezi.sharepoint.com/OutlookAddin/dialog.html';
  // ─────────────────────────────────────────────────────

  let dialog = null;

  Office.onReady(() => {
    document.getElementById('status').textContent = 'Bereit';
  });

  function openCalendar() {
    setStatus('Kalender wird geöffnet …');
    Office.context.ui.displayDialogAsync(
      DIALOG_URL,
      { height: 85, width: 90, displayInIframe: false },
      (result) => {
        if (result.status === Office.AsyncResultStatus.Failed) {
          setStatus('Fehler: ' + result.error.message);
          return;
        }
        dialog = result.value;
        dialog.addEventHandler(Office.EventType.DialogMessageReceived, onDialogMessage);
        dialog.addEventHandler(Office.EventType.DialogEventReceived,   onDialogEvent);
        setStatus('Kalender offen');
      }
    );
  }

  async function onDialogMessage(arg) {
    let data;
    try { data = JSON.parse(arg.message); } catch { return; }

    if (data.action === 'createAppointment') {
      setStatus('Termin wird gespeichert …');
      try {
        await createOutlookEvent(data);
        setStatus('✓ Termin gespeichert: ' + data.name);
      } catch (e) {
        setStatus('Fehler: ' + e.message);
      }
    }
  }

  function onDialogEvent(arg) {
    if (arg.error === 12006) {
      dialog = null;
      setStatus('Kalender geschlossen');
    }
  }

  // ── Termin per Graph API anlegen ──────────────────────
  async function createOutlookEvent(data) {
    const token = await getAccessToken();
    const body = {
      subject:  data.name,
      location: { displayName: data.addr },
      body:     { contentType: 'text', content: data.kz || '' },
      start:    { dateTime: data.start, timeZone: 'Europe/Berlin' },
      end:      { dateTime: data.end,   timeZone: 'Europe/Berlin' }
    };

    const res = await fetch('https://graph.microsoft.com/v1.0/me/events', {
      method:  'POST',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Content-Type':  'application/json'
      },
      body: JSON.stringify(body)
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || 'Graph API Fehler');
    }
    return res.json();
  }

  // ── SSO Token holen ───────────────────────────────────
  function getAccessToken() {
    return new Promise((resolve, reject) => {
      Office.auth.getAccessToken({ allowSignInPrompt: true }, (result) => {
        if (result.status === 'succeeded') {
          resolve(result.value);
        } else {
          reject(new Error(result.error.message));
        }
      });
    });
  }

  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }
</script>
</body>
</html>
